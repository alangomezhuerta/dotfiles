# Start window and pane numbering at 1 (instead of 0)
set -g base-index 1
setw -g pane-base-index 1

# Change prefix from C-b to C-a
unbind C-b
set -g prefix F1
bind F1 send-prefix

# Enable mouse support (resizing panes, selecting windows)
set -g mouse on


# Renumber windows when one is closed
set -g renumber-windows on

# Fast pane switching (Alt + Arrow keys) without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Reload config file
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"


# -- Corrected Copy Mode (macOS) -----------------------------------------------

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Use 'v' to begin selection (standard Vim behavior)
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Use 'y' to copy to macOS clipboard and exit copy-mode
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Use 'Enter' to copy to macOS clipboard and exit copy-mode
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Optional: Drag with mouse to copy automatically
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

